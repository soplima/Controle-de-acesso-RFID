<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Access Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, system-ui, sans-serif;
            background:
                radial-gradient(circle at top left, #6d28d9 0%, transparent 40%),
                radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 40%),
                linear-gradient(135deg, #0f172a, #111827);
            overflow: hidden;
        }

        .card {
            width: min(90vw, 600px);
            padding: 48px;
            text-align: center;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);

            transition: all 0.4s ease;
        }

        .indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #94a3b8;
            margin: 0 auto 24px;
            animation: pulse 2s infinite;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 1.25rem;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .name {
            color: #f8fafc;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            min-height: 80px;
            transition: color 0.3s ease;
        }

        .approved {
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow:
                0 0 40px rgba(34, 197, 94, 0.25),
                0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .approved .indicator {
            background: #22c55e;
        }

        .approved .name {
            color: #4ade80;
        }

        .denied {
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow:
                0 0 40px rgba(239, 68, 68, 0.25),
                0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .denied .indicator {
            background: #ef4444;
        }

        .denied .name {
            color: #f87171;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div class="indicator"></div>

        <h2 class="subtitle" id="subtitle">
            Waiting for scan...
        </h2>

        <h1 class="name" id="user-name">
            —
        </h1>
    </div>

    <script>
        const socket = io();

        const card = document.getElementById('card');
        const nameElement = document.getElementById('user-name');
        const subtitleElement = document.getElementById('subtitle');

        let resetTimer;

        socket.on('new_scan', function(data) {

            clearTimeout(resetTimer);

            card.classList.remove('approved', 'denied');

            nameElement.innerText = data.name;

            if (data.status === 'approved') {
                card.classList.add('approved');
                subtitleElement.innerText = 'Access Granted';
            } else {
                card.classList.add('denied');
                subtitleElement.innerText = 'Access Denied';
            }

            resetTimer = setTimeout(function() {
                card.classList.remove('approved', 'denied');
                nameElement.innerText = '—';
                subtitleElement.innerText = 'Waiting for scan...';
            }, 5000);
        });
    </script>

</body>
</html>
